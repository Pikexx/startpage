<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>~/start</title>
  <link href="https://fonts.cdnfonts.com/css/terminus" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #282828;
      --bg1:    #32302f;
      --bg2:    #3c3836;
      --fg:     #ebdbb2;
      --fg2:    #d5c4a1;
      --fg3:    #a89984;
      --fg4:    #665c54;
      --yellow: #fabd2f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg2);
      font-family: 'Terminus', 'Terminus (TTF)', 'Courier New', monospace;
      font-size: 17px;
      display: flex;
      justify-content: center;
      padding: 4rem 1rem;
    }

    .wrap {
      width: 100%;
      max-width: 680px;
    }

    /* topbar */
    .topbar {
      border: 1px solid var(--bg2);
      border-bottom: none;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--fg4);
      display: flex;
      justify-content: space-between;
      background: var(--bg1);
    }

    /* main box */
    .box {
      border: 1px solid var(--bg2);
      padding: 2rem 2.2rem;
      background: var(--bg1);
    }

    hr {
      border: none;
      border-top: 1px solid var(--bg2);
      margin: 1.6rem 0;
    }

    /* clock */
    #clock {
      font-size: 2.6rem;
      color: var(--yellow);
      letter-spacing: 0.06em;
      line-height: 1;
    }
    #clock .period {
      font-size: 1rem;
      color: var(--fg4);
      margin-left: 6px;
      letter-spacing: 0.2em;
    }
    #date {
      font-size: 12px;
      color: var(--fg4);
      margin-top: 6px;
    }

    /* search */
    .search {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search label { color: var(--fg4); white-space: nowrap; }
    .search input {
      background: var(--bg);
      border: 1px solid var(--bg2);
      color: var(--fg);
      font-family: inherit;
      font-size: 15px;
      padding: 4px 8px;
      outline: none;
      width: 100%;
      caret-color: var(--yellow);
    }
    .search input:focus { border-color: var(--fg3); }
    .search input::placeholder { color: var(--bg2); }

    /* links section */
    .links-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .links-header span { color: var(--fg4); font-size: 12px; }
    .toggle-hint { font-size: 11px; color: var(--fg4); opacity: 0.6; }

    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 1rem;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.25s ease;
      max-height: 0;
      opacity: 0;
    }
    .links.visible {
      max-height: 300px;
      opacity: 1;
    }

    .link-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .link-row::before {
      content: '»';
      color: var(--fg4);
      font-size: 12px;
    }
    .link-row a {
      color: var(--fg3);
      text-decoration: none;
      font-size: 15px;
    }
    .link-row a:hover {
      color: var(--fg);
      text-decoration: underline;
    }
    .link-row .desc {
      font-size: 12px;
      color: var(--fg4);
    }

    /* footer */
    .foot {
      border: 1px solid var(--bg2);
      border-top: none;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--fg4);
      background: var(--bg1);
      text-align: right;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <span>[ ~/start ]</span>
    <span id="toptime"></span>
  </div>

  <div class="box">

    <div>
      <div id="clock">00:00<span class="period" id="period"></span></div>
      <div id="date"></div>
    </div>

    <hr/>

    <div class="search">
      <label>search:</label>
      <input id="q" type="text" placeholder="..." autofocus autocomplete="off" spellcheck="false"/>
    </div>

    <hr/>

    <div class="links-header" onclick="toggleLinks()" title="click to toggle">
      <span>[ links ]</span>
      <span class="toggle-hint" id="hint">click to show</span>
    </div>

    <div class="links" id="links">
      <div class="link-row">
        <a href="https://github.com">github</a>
        <span class="desc">// code &amp; repos</span>
      </div>
      <div class="link-row">
        <a href="https://youtube.com">youtube</a>
        <span class="desc">// video</span>
      </div>
      <div class="link-row">
        <a href="https://crux.nu">crux linux</a>
        <span class="desc">// ports-based linux</span>
      </div>
    </div>

  </div>

  <div class="foot">i lowkey miss her</div>

</div>

<script>
  // clock — 12h with am/pm as single letter
  function tick() {
    const n   = new Date();
    const pad = x => String(x).padStart(2,'0');
    let   h   = n.getHours();
    const pm  = h >= 12;
    h = h % 12 || 12;
    const t = `${pad(h)}:${pad(n.getMinutes())}`;

    document.getElementById('clock').childNodes[0].textContent = t;
    document.getElementById('period').textContent = pm ? 'p' : 'a';
    document.getElementById('toptime').textContent = t + (pm ? 'p' : 'a');

    const days = ['sun','mon','tue','wed','thu','fri','sat'];
    const mons = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    document.getElementById('date').textContent =
      `${days[n.getDay()]}  ${n.getDate()} ${mons[n.getMonth()]} ${n.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);

  // toggle links
  let shown = false;
  function toggleLinks() {
    shown = !shown;
    document.getElementById('links').classList.toggle('visible', shown);
    document.getElementById('hint').textContent = shown ? 'click to hide' : 'click to show';
  }

  // also toggle with L key
  document.addEventListener('keydown', e => {
    if (e.key === 'l' || e.key === 'L') toggleLinks();
  });

  // search
  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const q = e.target.value.trim();
    if (!q) return;
    window.location.href = /^https?:\/\//.test(q) || /^[\w-]+\.(com|org|net|io|dev|nu)/.test(q)
      ? (q.startsWith('http') ? q : 'https://' + q)
      : `https://google.com/search?q=${encodeURIComponent(q)}`;
  });
</script>
</body>
</html>
