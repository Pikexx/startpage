<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>~/start</title>
  <link href="https://fonts.cdnfonts.com/css/terminus" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #282828;
      --bg1:    #32302f;
      --bg2:    #3c3836;
      --fg:     #ebdbb2;
      --fg2:    #d5c4a1;
      --fg3:    #a89984;
      --fg4:    #665c54;
      --yellow: #fabd2f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-weight: normal; }

    body {
      background: var(--bg);
      color: var(--fg2);
      font-family: 'Terminus', 'Terminus (TTF)', 'Courier New', monospace;
      font-size: clamp(13px, 1.5vw, 17px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: clamp(1.5rem, 6vw, 4rem) clamp(0.75rem, 4vw, 1.5rem);
    }

    .wrap {
      width: 100%;
      max-width: min(680px, 96vw);
    }

    /* topbar */
    .topbar {
      border: 1px solid var(--bg2);
      border-bottom: none;
      padding: 4px 12px;
      font-size: clamp(10px, 1.1vw, 12px);
      color: var(--fg4);
      display: flex;
      justify-content: space-between;
      background: var(--bg1);
    }

    /* main box */
    .box {
      border: 1px solid var(--bg2);
      padding: clamp(1rem, 4vw, 2rem) clamp(1rem, 4.5vw, 2.2rem);
      background: var(--bg1);
    }

    hr {
      border: none;
      border-top: 1px solid var(--bg2);
      margin: clamp(1rem, 3vw, 1.6rem) 0;
    }

    /* clock */
    #clock {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      color: var(--yellow);
      letter-spacing: 0.06em;
      line-height: 1;
      font-weight: normal;
    }
    #date {
      font-size: clamp(10px, 1.1vw, 12px);
      color: var(--fg4);
      margin-top: 6px;
    }

    /* search */
    .search {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search label { color: var(--fg4); white-space: nowrap; }
    .search input {
      background: var(--bg);
      border: 1px solid var(--bg2);
      color: var(--fg);
      font-family: inherit;
      font-size: clamp(12px, 1.4vw, 15px);
      font-weight: normal;
      padding: 4px 8px;
      outline: none;
      width: 100%;
      caret-color: var(--yellow);
    }
    .search input:focus { border-color: var(--fg3); }
    .search input::placeholder { color: var(--bg2); }

    /* links section */
    .links-header span { color: var(--fg4); font-size: clamp(10px, 1.1vw, 12px); }

    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 1rem;
    }

    .link-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .link-row::before {
      content: '»';
      color: var(--fg4);
      font-size: clamp(10px, 1.1vw, 12px);
    }
    .link-row a {
      color: var(--fg3);
      text-decoration: none;
      font-size: clamp(12px, 1.4vw, 15px);
      font-weight: normal;
    }
    .link-row a:hover {
      color: var(--fg);
      text-decoration: underline;
    }
    .link-row .desc {
      font-size: clamp(10px, 1.1vw, 12px);
      color: var(--fg4);
    }

    /* footer */
    .foot {
      border: 1px solid var(--bg2);
      border-top: none;
      padding: 4px 12px;
      font-size: clamp(10px, 1vw, 11px);
      color: var(--fg4);
      background: var(--bg1);
      text-align: right;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <span>[ ~/start ]</span>
    <span id="toptime"></span>
  </div>

  <div class="box">

    <div>
      <div id="clock">00:00</div>
      <div id="date"></div>
    </div>

    <hr/>

    <div class="search">
      <label>search:</label>
      <input id="q" type="text" placeholder="..." autofocus autocomplete="off" spellcheck="false"/>
    </div>

    <hr/>

    <div class="links-header">
      <span>[ links ]</span>
    </div>

    <div class="links">
      <div class="link-row">
        <a href="https://github.com">github</a>
        <span class="desc">// fuh &amp; ahh</span>
      </div>
      <div class="link-row">
        <a href="https://youtube.com">youtube</a>
        <span class="desc">// video</span>
      </div>
      <div class="link-row">
        <a href="https://crux.nu">crux linux</a>
        <span class="desc">// linux</span>
      </div>
    </div>

  </div>

  <div class="foot">i lowkey miss her</div>

</div>

<script>
  // clock — 12h with a/p suffix
  function tick() {
    const n   = new Date();
    const pad = x => String(x).padStart(2, '0');
    let   h   = n.getHours();
    const pm  = h >= 12;
    h = h % 12 || 12;
    const t   = `${pad(h)}:${pad(n.getMinutes())}`;
    const suf = pm ? 'p' : 'a';

    document.getElementById('clock').textContent = t + suf;
    document.getElementById('toptime').textContent = t + suf;

    const days = ['sun','mon','tue','wed','thu','fri','sat'];
    const mons = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    document.getElementById('date').textContent =
      `${days[n.getDay()]}  ${n.getDate()} ${mons[n.getMonth()]} ${n.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);

  // search
  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const q = e.target.value.trim();
    if (!q) return;
    window.location.href = /^https?:\/\//.test(q) || /^[\w-]+\.(com|org|net|io|dev|nu)/.test(q)
      ? (q.startsWith('http') ? q : 'https://' + q)
      : `https://google.com/search?q=${encodeURIComponent(q)}`;
  });
</script>
</body>
</html>
